<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" viewBox="0 0 240 270" width="400">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#333"/>
    </marker>
  </defs>

  <!-- Wall background (painted plasterboard) -->
  <rect x="0" y="0" width="203" height="244" fill="#c8d5c3" stroke="#999" stroke-width="1.5"/>

  <!-- Ceiling line -->
  <line x1="0" y1="0" x2="203" y2="0" stroke="#666" stroke-width="2"/>

  <!-- Floor line -->
  <line x1="0" y1="244" x2="203" y2="244" stroke="#666" stroke-width="2"/>

  <!-- Corner edge (right side, bold) -->
  <line x1="203" y1="0" x2="203" y2="244" stroke="#333" stroke-width="2.5"/>

  <!-- White space below for measurements -->
  <rect x="0" y="244" width="240" height="26" fill="white"/>

  <!-- Fibre box (203cm from corner, 181cm from ceiling to top) -->
  <rect x="0" y="181" width="17" height="13" fill="#333" stroke="#000" stroke-width="1" rx="1"/>
  <text x="8" y="189" text-anchor="middle" fill="#0f0" font-size="3.5" font-weight="bold">FB</text>

  <!-- Labels -->
  <text x="8" y="201" text-anchor="middle" fill="#555" font-size="4">Fibre Box</text>

  <!-- Heat pump (50cm from left edge of fibre box, 78cm wide, 29cm tall, 18cm from ceiling) -->
  <rect x="50" y="18" width="78" height="29" fill="#e0e0e0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="89" y="36" text-anchor="middle" fill="#333" font-size="5" font-weight="bold">Heat Pump</text>

  <!-- Dimension: 203cm wall width (bottom) -->
  <line x1="0" y1="249" x2="0" y2="255" stroke="#333" stroke-width="0.6"/>
  <line x1="203" y1="249" x2="203" y2="255" stroke="#333" stroke-width="0.6"/>
  <line x1="0" y1="252" x2="203" y2="252" stroke="#333" stroke-width="0.6"/>
  <text x="101" y="262" text-anchor="middle" fill="#333" font-size="5">203cm</text>

  <!-- Dimension: 244cm wall height (right side) -->
  <line x1="213" y1="0" x2="223" y2="0" stroke="#333" stroke-width="0.6"/>
  <line x1="213" y1="244" x2="223" y2="244" stroke="#333" stroke-width="0.6"/>
  <line x1="218" y1="0" x2="218" y2="244" stroke="#333" stroke-width="0.6"/>
  <text x="231" y="125" text-anchor="middle" fill="#333" font-size="5" transform="rotate(90,231,125)">244cm</text>

  <!-- Dimension: 181cm from ceiling to fibre box top -->
  <line x1="22" y1="3" x2="28" y2="3" stroke="#333" stroke-width="0.6"/>
  <line x1="22" y1="180" x2="28" y2="180" stroke="#333" stroke-width="0.6"/>
  <line x1="25" y1="3" x2="25" y2="180" stroke="#333" stroke-width="0.6"/>
  <text x="20" y="93" text-anchor="end" fill="#333" font-size="4" transform="rotate(-90,20,93)">181cm</text>
</svg>
