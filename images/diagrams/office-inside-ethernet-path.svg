<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" viewBox="0 0 470 240" width="600">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#333"/>
    </marker>
  </defs>

  <!-- Wall background (plasterboard) -->
  <rect x="0" y="0" width="460" height="215" fill="#e8e4dc" stroke="#999" stroke-width="1.5"/>

  <!-- Ceiling line -->
  <line x1="0" y1="0" x2="460" y2="0" stroke="#666" stroke-width="2"/>

  <!-- Floor line -->
  <line x1="0" y1="215" x2="460" y2="215" stroke="#666" stroke-width="2"/>

  <!-- White space below for measurements -->
  <rect x="0" y="215" width="470" height="25" fill="white"/>

  <!-- Door on left edge -->
  <rect x="0" y="30" width="10" height="180" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="5" y="125" text-anchor="middle" fill="white" font-size="5" transform="rotate(-90,5,125)">Door</text>

  <!-- Horizontal trunking: from [plug 1] past [plug 2] to corner -->
  <rect x="267" y="165" width="149" height="4" fill="#ccc" stroke="#999" stroke-width="0.5"/>

  <!-- Vertical trunking: from corner up to power back box -->
  <!-- corner at y=167, power box bottom at y=37, distance = 130cm (163-25-12=126... but user said 67cm vertical) -->
  <rect x="414" y="37" width="4" height="130" fill="#ccc" stroke="#999" stroke-width="0.5"/>

  <!-- Power back box [3] (25cm from ceiling) -->
  <rect x="410" y="25" width="12" height="12" fill="#ddd" stroke="#666" stroke-width="1" rx="1"/>
  <text x="416" y="33" text-anchor="middle" fill="#333" font-size="4">P</text>

  <!-- Plug 2 -->
  <rect x="334" y="161" width="12" height="12" fill="#ddd" stroke="#666" stroke-width="1" rx="1"/>

  <!-- Plug 1 -->
  <rect x="255" y="161" width="12" height="12" fill="#ddd" stroke="#666" stroke-width="1" rx="1"/>

  <!-- New ethernet box [E] (10cm left of plug 1) -->
  <rect x="233" y="161" width="12" height="12" fill="#4a90d9" stroke="#2a6dbf" stroke-width="1.5" rx="1"/>
  <text x="239" y="169" text-anchor="middle" fill="white" font-size="4" font-weight="bold">E</text>

  <!-- Ethernet cable from ceiling down to box [E] (red dotted) -->
  <line x1="239" y1="0" x2="239" y2="161" stroke="red" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Labels -->
  <text x="416" y="20" text-anchor="middle" fill="#666" font-size="4">Power Back</text>
  <text x="239" y="179" text-anchor="middle" fill="#2a6dbf" font-size="4" font-weight="bold">Ethernet</text>
  <text x="261" y="179" text-anchor="middle" fill="#666" font-size="4">Plug 1</text>
  <text x="340" y="179" text-anchor="middle" fill="#666" font-size="4">Plug 2</text>

  <!-- Dimension: 255cm from door to [plug 1] -->
  <line x1="10" y1="220" x2="10" y2="226" stroke="#333" stroke-width="0.6"/>
  <line x1="255" y1="220" x2="255" y2="226" stroke="#333" stroke-width="0.6"/>
  <line x1="10" y1="223" x2="255" y2="223" stroke="#333" stroke-width="0.6"/>
  <text x="132" y="232" text-anchor="middle" fill="#333" font-size="5">255cm</text>

  <!-- Dimension: 67cm from [plug 1] to [plug 2] -->
  <line x1="255" y1="154" x2="255" y2="158" stroke="#333" stroke-width="0.6"/>
  <line x1="332" y1="154" x2="332" y2="158" stroke="#333" stroke-width="0.6"/>
  <line x1="255" y1="156" x2="332" y2="156" stroke="#333" stroke-width="0.6"/>
  <text x="294" y="153" text-anchor="middle" fill="#333" font-size="4">67cm</text>

  <!-- Dimension: 70cm from [plug 2] to corner -->
  <line x1="336" y1="154" x2="336" y2="158" stroke="#333" stroke-width="0.6"/>
  <line x1="416" y1="154" x2="416" y2="158" stroke="#333" stroke-width="0.6"/>
  <line x1="336" y1="156" x2="416" y2="156" stroke="#333" stroke-width="0.6"/>
  <text x="375" y="153" text-anchor="middle" fill="#333" font-size="4">70cm</text>

  <!-- Dimension: 25cm from ceiling to power back box -->
  <line x1="440" y1="0" x2="446" y2="0" stroke="#333" stroke-width="0.6"/>
  <line x1="440" y1="25" x2="446" y2="25" stroke="#333" stroke-width="0.6"/>
  <line x1="443" y1="0" x2="443" y2="25" stroke="#333" stroke-width="0.6"/>
  <text x="449" y="15" text-anchor="start" fill="#333" font-size="4">25cm</text>

  <!-- Dimension: 163cm from ceiling to plug row -->
  <line x1="247" y1="3" x2="253" y2="3" stroke="#333" stroke-width="0.6"/>
  <line x1="247" y1="160" x2="253" y2="160" stroke="#333" stroke-width="0.6"/>
  <line x1="250" y1="3" x2="250" y2="160" stroke="#333" stroke-width="0.6"/>
  <text x="245" y="85" text-anchor="end" fill="#333" font-size="4" transform="rotate(-90,245,85)">163cm</text>

  <!-- Legend -->
  <rect x="50" y="3" width="85" height="22" rx="2" fill="rgba(0,0,0,0.4)"/>
  <line x1="55" y1="10" x2="70" y2="10" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="74" y="13" fill="white" font-size="4">Ethernet cable</text>
  <rect x="55" y="16" width="8" height="5" fill="#ddd" stroke="#666" stroke-width="0.5"/>
  <text x="74" y="21" fill="white" font-size="4">Existing boxes</text>
</svg>