<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" viewBox="0 -35 140 358" width="250">
  <defs>
    <pattern id="blockwork" width="30" height="15" patternUnits="userSpaceOnUse">
      <rect width="30" height="15" fill="#a0a0a0"/>
      <line x1="0" y1="0" x2="30" y2="0" stroke="#888" stroke-width="0.5"/>
      <line x1="15" y1="0" x2="15" y2="7.5" stroke="#888" stroke-width="0.5"/>
      <line x1="0" y1="7.5" x2="30" y2="7.5" stroke="#888" stroke-width="0.5"/>
      <line x1="0" y1="7.5" x2="0" y2="15" stroke="#888" stroke-width="0.5"/>
      <line x1="30" y1="7.5" x2="30" y2="15" stroke="#888" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Sky background -->
  <rect x="0" y="-35" width="140" height="358" fill="#87CEEB"/>

  <!-- Roof (grey triangle, slopes up from corner toward ridge off-screen left) -->
  <polygon points="105,8 0,-30 0,8" fill="#888"/>

  <!-- Fascia/gutter (brown strip at eaves) -->
  <rect x="0" y="8" width="105" height="12" fill="#4a3a2a"/>

  <!-- Wall face (blockwork) -->
  <rect x="0" y="20" width="105" height="275" fill="url(#blockwork)" stroke="#888" stroke-width="1"/>

  <!-- Corner edge (bold line at right edge of wall) -->
  <line x1="105" y1="8" x2="105" y2="295" stroke="#333" stroke-width="2.5"/>

  <!-- White space below wall for measurements -->
  <rect x="0" y="295" width="140" height="28" fill="white"/>

  <!-- Downpipe: 26cm from corner, 7.5cm wide -->
  <!-- Right edge at x=105-26=79, left edge at x=79-7.5=71.5 -->
  <rect x="71.5" y="20" width="7.5" height="275" fill="#c0c0c0" stroke="#666" stroke-width="1"/>

  <!-- Pipe brackets (clips) -->
  <rect x="69.5" y="55" width="11.5" height="2.5" fill="#444" rx="0.5"/>
  <rect x="69.5" y="125" width="11.5" height="2.5" fill="#444" rx="0.5"/>
  <rect x="69.5" y="195" width="11.5" height="2.5" fill="#444" rx="0.5"/>
  <rect x="69.5" y="268" width="11.5" height="2.5" fill="#444" rx="0.5"/>

  <!-- Labels -->
  <text x="75" y="160" text-anchor="middle" fill="#666" font-size="5" transform="rotate(-90,75,160)">Downpipe</text>

  <!-- Dimension: 275cm wall height (right side) -->
  <line x1="115" y1="20" x2="125" y2="20" stroke="#333" stroke-width="0.8"/>
  <line x1="115" y1="295" x2="125" y2="295" stroke="#333" stroke-width="0.8"/>
  <line x1="120" y1="20" x2="120" y2="295" stroke="#333" stroke-width="0.8"/>
  <text x="132" y="160" text-anchor="middle" fill="#333" font-size="6" transform="rotate(90,132,160)">275cm</text>

  <!-- Dimension: 26cm from corner to downpipe right edge -->
  <line x1="79" y1="297" x2="79" y2="303" stroke="#333" stroke-width="0.6"/>
  <line x1="105" y1="297" x2="105" y2="303" stroke="#333" stroke-width="0.6"/>
  <line x1="79" y1="300" x2="105" y2="300" stroke="#333" stroke-width="0.6"/>
  <text x="92" y="308" text-anchor="middle" fill="#333" font-size="4">26cm</text>

  <!-- Dimension: 7.5cm downpipe width -->
  <line x1="71.5" y1="309" x2="71.5" y2="315" stroke="#333" stroke-width="0.6"/>
  <line x1="79" y1="309" x2="79" y2="315" stroke="#333" stroke-width="0.6"/>
  <line x1="71.5" y1="312" x2="79" y2="312" stroke="#333" stroke-width="0.6"/>
  <text x="75" y="320" text-anchor="middle" fill="#333" font-size="4">7.5cm</text>
</svg>
