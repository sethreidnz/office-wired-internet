<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" viewBox="0 0 240 270" width="400">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#333"/>
    </marker>
  </defs>

  <!-- Wall background (painted plasterboard) -->
  <rect x="0" y="0" width="202" height="245" fill="#c8d5c3" stroke="#999" stroke-width="1.5"/>

  <!-- Ceiling line -->
  <line x1="0" y1="0" x2="202" y2="0" stroke="#666" stroke-width="2"/>

  <!-- Floor line -->
  <line x1="0" y1="245" x2="202" y2="245" stroke="#666" stroke-width="2"/>

  <!-- Corner edge (right side, bold) -->
  <line x1="202" y1="0" x2="202" y2="245" stroke="#333" stroke-width="2.5"/>

  <!-- White space below for measurements -->
  <rect x="0" y="245" width="240" height="25" fill="white"/>

  <!-- Fibre box (near corner, 180cm from ceiling to top) -->
  <!-- Right edge near corner: let's put it at x=185-202 = right edge at corner -->
  <!-- Actually, the measurement says 202cm from corner to fibre box, so fibre box IS at the far left end -->
  <!-- Wait - "bottom-right corner of house to fibre box" = 202cm, so fibre box left edge is at x=0 and corner at x=202 -->
  <!-- But that doesn't seem right from the photo - the fibre box is NEAR the corner -->
  <!-- Re-reading: the wall width shown is 202cm from corner to fibre box, meaning we show 202cm of wall with fibre box at the far end from the corner -->
  <!-- From the bird's eye: fibre box is on the right wall of the house, and corner is bottom-right -->
  <!-- So fibre box is 202cm from the corner along the wall. In our diagram, corner on right, fibre box on left -->
  <!-- Actually let's put corner on right, fibre box at x=0 (202cm from corner) -->
  <rect x="0" y="180" width="17" height="13" fill="#333" stroke="#000" stroke-width="1" rx="1"/>
  <text x="8" y="188" text-anchor="middle" fill="#0f0" font-size="3.5" font-weight="bold">FB</text>

  <!-- Labels -->
  <text x="8" y="200" text-anchor="middle" fill="#555" font-size="4">Fibre Box</text>

  <!-- Heat pump (70cm from left edge of fibre box, 78cm wide, 30cm tall, 20cm from ceiling) -->
  <rect x="70" y="20" width="78" height="30" fill="#e0e0e0" stroke="#aaa" stroke-width="1" rx="2"/>
  <text x="109" y="38" text-anchor="middle" fill="#333" font-size="5" font-weight="bold">Heat Pump</text>

  <!-- Dimension: 202cm wall width (bottom) -->
  <line x1="0" y1="250" x2="0" y2="256" stroke="#333" stroke-width="0.6"/>
  <line x1="202" y1="250" x2="202" y2="256" stroke="#333" stroke-width="0.6"/>
  <line x1="0" y1="253" x2="202" y2="253" stroke="#333" stroke-width="0.6"/>
  <text x="101" y="263" text-anchor="middle" fill="#333" font-size="5">202cm</text>

  <!-- Dimension: 245cm wall height (right side) -->
  <line x1="212" y1="0" x2="222" y2="0" stroke="#333" stroke-width="0.6"/>
  <line x1="212" y1="245" x2="222" y2="245" stroke="#333" stroke-width="0.6"/>
  <line x1="217" y1="0" x2="217" y2="245" stroke="#333" stroke-width="0.6"/>
  <text x="230" y="125" text-anchor="middle" fill="#333" font-size="5" transform="rotate(90,230,125)">245cm</text>

  <!-- Dimension: 180cm from ceiling to fibre box top -->
  <line x1="22" y1="3" x2="28" y2="3" stroke="#333" stroke-width="0.6"/>
  <line x1="22" y1="179" x2="28" y2="179" stroke="#333" stroke-width="0.6"/>
  <line x1="25" y1="3" x2="25" y2="179" stroke="#333" stroke-width="0.6"/>
  <text x="20" y="93" text-anchor="end" fill="#333" font-size="4" transform="rotate(-90,20,93)">180cm</text>

  <!-- Fibre outlet (10cm to the right of fibre box) -->
  <rect x="27" y="180" width="12" height="12" fill="#4a90d9" stroke="#2a6dbf" stroke-width="1.5" rx="1"/>
  <text x="33" y="188" text-anchor="middle" fill="white" font-size="3.5" font-weight="bold">E</text>
  <text x="33" y="200" text-anchor="middle" fill="#2a6dbf" font-size="4" font-weight="bold">Fibre</text>

  <!-- Fibre cable from outlet up to ceiling (red dotted) -->
  <line x1="33" y1="180" x2="33" y2="0" stroke="red" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- "Inside wall up to roof" label with arrow -->
  <marker id="arrow-red" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
    <polygon points="0,0 6,2 0,4" fill="red"/>
  </marker>
  <text x="70" y="105" fill="red" font-size="5" font-weight="bold">Inside wall</text>
  <text x="70" y="112" fill="red" font-size="5" font-weight="bold">up to roof</text>
  <line x1="67" y1="108" x2="37" y2="80" stroke="red" stroke-width="0.8" marker-end="url(#arrow-red)"/>

  <!-- Legend -->
  <rect x="60" y="3" width="85" height="14" rx="2" fill="rgba(0,0,0,0.4)"/>
  <line x1="65" y1="10" x2="80" y2="10" stroke="red" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="84" y="13" fill="white" font-size="4">Fibre cable</text>
</svg>
