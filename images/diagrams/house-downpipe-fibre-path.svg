<svg xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" viewBox="0 -35 140 353" width="250">
  <defs>
    <pattern id="blockwork" width="30" height="15" patternUnits="userSpaceOnUse">
      <rect width="30" height="15" fill="#a0a0a0"/>
      <line x1="0" y1="0" x2="30" y2="0" stroke="#888" stroke-width="0.5"/>
      <line x1="15" y1="0" x2="15" y2="7.5" stroke="#888" stroke-width="0.5"/>
      <line x1="0" y1="7.5" x2="30" y2="7.5" stroke="#888" stroke-width="0.5"/>
      <line x1="0" y1="7.5" x2="0" y2="15" stroke="#888" stroke-width="0.5"/>
      <line x1="30" y1="7.5" x2="30" y2="15" stroke="#888" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-red" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="red"/>
    </marker>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#333"/>
    </marker>
  </defs>

  <!-- Sky background -->
  <rect x="0" y="-35" width="140" height="353" fill="#87CEEB"/>

  <!-- Roof (grey triangle, slopes up from corner toward ridge off-screen left) -->
  <polygon points="105,8 0,-30 0,8" fill="#888"/>

  <!-- Fascia/gutter (brown strip at eaves) -->
  <rect x="0" y="8" width="105" height="12" fill="#4a3a2a"/>

  <!-- Wall face (blockwork) -->
  <rect x="0" y="20" width="105" height="272" fill="url(#blockwork)" stroke="#888" stroke-width="1"/>

  <!-- Corner edge (bold line at right edge of wall) -->
  <line x1="105" y1="8" x2="105" y2="292" stroke="#333" stroke-width="2.5"/>

  <!-- White space below wall for measurements -->
  <rect x="0" y="292" width="140" height="26" fill="white"/>

  <!-- Downpipe: 16cm from corner, 8cm wide -->
  <rect x="81" y="20" width="8" height="272" fill="#c0c0c0" stroke="#666" stroke-width="1"/>

  <!-- Pipe brackets (clips) -->
  <rect x="79" y="55" width="12" height="2.5" fill="#444" rx="0.5"/>
  <rect x="79" y="125" width="12" height="2.5" fill="#444" rx="0.5"/>
  <rect x="79" y="195" width="12" height="2.5" fill="#444" rx="0.5"/>
  <rect x="79" y="265" width="12" height="2.5" fill="#444" rx="0.5"/>

  <!-- Labels -->
  <text x="85" y="160" text-anchor="middle" fill="#666" font-size="5" transform="rotate(-90,85,160)">Downpipe</text>

  <!-- ETHERNET CONDUIT PATH (red dotted) -->
  <!-- Down right side of downpipe, then right along wall at floor level -->
  <path d="M 93,20 L 93,288 Q 93,292 97,292 L 140,292"
        fill="none" stroke="red" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- "Coming out of soffit" label in wall, arrow pointing up to soffit exit -->
  <text x="10" y="55" fill="red" font-size="5" font-weight="bold">Coming out of soffit</text>
  <line x1="50" y1="48" x2="90" y2="22" stroke="red" stroke-width="0.8" marker-end="url(#arrow-red)"/>

  <!-- Legend -->
  <rect x="2" y="296" width="55" height="14" rx="2" fill="rgba(255,255,255,0.95)" stroke="#ccc" stroke-width="0.5"/>
  <line x1="6" y1="303" x2="20" y2="303" stroke="red" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="23" y="306" fill="#333" font-size="4.5">Fibre conduit</text>

  <!-- Dimension: 272cm wall height (right side) -->
  <line x1="115" y1="20" x2="125" y2="20" stroke="#333" stroke-width="0.8"/>
  <line x1="115" y1="292" x2="125" y2="292" stroke="#333" stroke-width="0.8"/>
  <line x1="120" y1="20" x2="120" y2="292" stroke="#333" stroke-width="0.8"/>
  <text x="132" y="160" text-anchor="middle" fill="#333" font-size="6" transform="rotate(90,132,160)">272cm</text>
</svg>
